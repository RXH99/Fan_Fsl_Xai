experiment_name: Fan_Fsl_Xai_Clean

data:
  raw_dir: "data"
  processed_dir: "data/processed"
  window_size: 1024
  window_step: 1024

training:
  cnn:
    batch_size: 64
    epochs: 50
    lr: 0.001

  fewshot:
    episodes: 3000
    val_episodes: 200
    ways: 10
    shot: 5
    query: 5
    lr: 0.0001

  sep_weight: 0.15

model:
  backbone: "resnet18"
  encoder_dim: 128
  resnet:
    in_channels: 1
    base_filters: 64
    use_se: true
    use_multiscale: false

# UWT (不确定性加权直推式推理) 参数
inference:
  uwt:
    enabled: true           # 是否启用UWT
    steps: 3                # 迭代步数
    tau: 0.3                # 温度系数（softmax）
    mix_ratio: 0.8          # 动量混合比例 (0.8 * old + 0.2 * new)
    beta_default: 1.0       # 默认beta值（5w5s）
    # Beta调优范围（可选）
    beta_search:
      5w1s: 3.0
      5w5s: 1.0
      10w1s: 2.0
      10w5s: 1.0

paths:
  output_dir: "outputs/clean"
  data_info: "data/dataset_info.json"
