experiment_name: Fan_Fsl_Xai_TF_Fusion

data:
  raw_dir: "data"
  processed_dir: "data/processed"
  window_size: 1024
  window_step: 1024

training:
  cnn:
    batch_size: 64
    epochs: 50
    lr: 0.001

  fewshot:
    episodes: 3000
    val_episodes: 200
    ways: 10
    shot: 5
    query: 5
    lr: 0.0001

  sep_weight: 0.15

model:
  backbone: "time_frequency"     # 新编码器：时频融合
  time_encoder_backbone: "resnet18"  # 时域分支预训练权重的 backbone 名
  encoder_dim: 64
  resnet:
    in_channels: 1
    base_filters: 32
    use_se: true

  # 频域分支配置
  freq_branch:
    n_fft: 128                   # STFT FFT 点数
    hop_length: 64               # 帧移
    win_length: 128              # 窗长
    base_filters: 32             # 轻量 CNN 通道数
    gate_init: 0.5               # 门控初始值（0.5 = 时频各半）

  freeze_time_encoder: false     # 不冻结，时域+频域+融合层联合微调

paths:
  output_dir: "outputs/tf_fusion"
  data_info: "data/dataset_info.json"
