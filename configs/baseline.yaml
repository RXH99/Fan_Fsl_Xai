# 基线配置（与 FSL_fan 完全一致，确保可复现）
data:
  raw_dir: "data"
  processed_dir: "data/processed"
  window_size: 1024
  window_step: 1024

training:
  cnn:
    batch_size: 64
    epochs: 50
    lr: 0.001
  fewshot:
    episodes: 3000
    val_episodes: 200
    ways: 5
    shot: 5
    query: 5
    lr: 0.0001

model:
  cnn:
    channels_per_class: 20
  encoder_dim: 64

paths:
  output_dir: "outputs/baseline"
  data_info: "data/dataset_info.json"
