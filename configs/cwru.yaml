experiment_name: CWRU_FewShot

data:
  raw_dir: "data_cwru"
  processed_dir: "data_cwru/processed"
  window_size: 1024
  window_step: 512

training:
  cnn:
    batch_size: 64
    epochs: 50
    lr: 0.001

  fewshot:
    episodes: 3000
    val_episodes: 200
    ways: 5
    shot: 5
    query: 15
    lr: 0.0001

  sep_weight: 0.05

model:
  backbone: "resnet18"
  encoder_dim: 64
  resnet:
    in_channels: 1
    base_filters: 32
    use_se: true

paths:
  output_dir: "outputs_cwru"
  data_info: "data_cwru/dataset_info.json"
