experiment_name: Fan_Fsl_Xai_TF_Inject

data:
  raw_dir: "data"
  processed_dir: "data/processed"
  window_size: 1024
  window_step: 1024

training:
  cnn:
    batch_size: 64
    epochs: 50
    lr: 0.001

  fewshot:
    episodes: 3000
    val_episodes: 200
    ways: 10
    shot: 5
    query: 5
    lr: 0.0001

  sep_weight: 0.15

model:
  backbone: "time_frequency_inject"  # 频域注入时域特征图
  time_encoder_backbone: "resnet18"
  encoder_dim: 64
  resnet:
    in_channels: 1
    base_filters: 32
    use_se: true

  freq_branch:
    n_fft: 128
    hop_length: 64
    win_length: 128
    base_filters: 32

  freeze_time_encoder: false     # 联合微调

paths:
  output_dir: "outputs/tf_inject"
  data_info: "data/dataset_info.json"
